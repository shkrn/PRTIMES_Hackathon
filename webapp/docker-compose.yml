services:
  postgresql:
    image: postgres:16
    container_name: press-release-db
    environment:
      POSTGRES_USER: press_release
      POSTGRES_PASSWORD: press_release
      POSTGRES_DB: press_release_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U press_release"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./python  # Default: PHP. Change to ./python or ./go as needed
    container_name: press-release-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgresql
      DB_PORT: 5432
      DB_USER: press_release
      DB_PASSWORD: press_release
      DB_NAME: press_release_db
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  postgres_data:
